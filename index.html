<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投放数据看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="title-block">
      <div class="eyebrow"><span class="dot"></span> ReelShort EN · 投放数据看板</div>
      <h1 id="dramaTitle">投放数据看板</h1>
      <div class="sub">
        <span>更新时间 · <b id="dateLabel">加载中…</b></span>
        <span style="display:none">口径 · <b>Ad 级回收</b></span>
        <span style="display:none">来源 · <b id="srcLabel">线上快照</b></span>
      </div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="panel">
    <div class="controls">
      <div class="field"><label>分组维度</label>
        <div class="seg" id="groupSeg">
          <button data-g="优化师" class="on">优化师</button>
          <button data-g="媒体">媒体</button>
          <button data-g="类型">类型</button>
          <button data-g="事件">投放事件</button>
        </div>
      </div>
      <div class="field"><label>剧目（可搜索）</label>
        <div class="combo" id="dramaCombo">
          <input type="text" id="f_drama" placeholder="搜索剧名…" autocomplete="off">
          <svg class="combo-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          <div class="combo-list" id="dramaList"></div>
        </div>
      </div>
      <div class="field"><label>媒体</label><select id="f_媒体"></select></div>
      <div class="field"><label>类型</label><select id="f_类型"></select></div>
      <div class="field"><label>投放事件</label><select id="f_事件"></select></div>
      <div class="field"><label>优化师（可搜索）</label>
        <div class="combo" id="optCombo">
          <input type="text" id="f_优化师" placeholder="搜索优化师…" autocomplete="off">
          <svg class="combo-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          <div class="combo-list" id="optList"></div>
        </div>
      </div>
      <button class="reset" id="resetBtn">重置筛选</button>
    </div>
    <div class="resultbar">
      <div>分组 <b id="rowCount">0</b> 行 · 当前筛选合计花费 <b id="filteredSpend">$0</b></div>
      <div class="chiprow" id="chiprow"></div>
    </div>
    <div class="tablescroll">
      <table id="tbl"><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>

  <div class="foot">
    数据为管理员最近一次发布的快照。分组维度可切换，其余维度叠加筛选；默认按当前分组<b>花费降序</b>，点表头可改排序。
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="dashboard.js"></script>
<script>
  Dashboard.mount();
  fetch('data.json?t='+Date.now())
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(d=>{ Dashboard.setSource('线上快照'); Dashboard.load(d); })
    .catch(err=>{
      document.getElementById('dateLabel').textContent='数据加载失败';
      document.getElementById('tbody').innerHTML='<tr><td colspan="9"><div class="empty">未能加载 data.json（'+err+'）。请确认仓库里有 data.json，或稍后刷新。</div></td></tr>';
    });
</script>
</body>
</html>
